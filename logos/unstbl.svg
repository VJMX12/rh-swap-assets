<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UNSTBL Unstable Doge Coin">
  <defs>
    <radialGradient id="u-bg" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#DFF7DC"/>
      <stop offset="1" stop-color="#BFEFC0"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="120" fill="url(#u-bg)"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#00C805" stroke-opacity="0.35" stroke-width="4"/>

  <!-- wobbly baseline to signal 'unstable' -->
  <path d="M40 176 q22 -22 44 0 t44 0 t44 0 t44 0" fill="none" stroke="#00A804" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round"/>

  <!-- doge head -->
  <g transform="rotate(-6 128 122)">
    <!-- ears -->
    <path d="M78 70 q-6 -34 26 -40 q-6 26 10 42 z" fill="#00C805"/>
    <path d="M178 70 q6 -34 -26 -40 q6 26 -10 42 z" fill="#00C805"/>
    <!-- head -->
    <ellipse cx="128" cy="124" rx="66" ry="58" fill="#00C805"/>
    <!-- muzzle -->
    <ellipse cx="128" cy="150" rx="38" ry="28" fill="#F3FDF1"/>
    <!-- eyes -->
    <circle cx="103" cy="110" r="8" fill="#0F3D0F"/>
    <circle cx="153" cy="110" r="8" fill="#0F3D0F"/>
    <circle cx="100" cy="107" r="2.4" fill="#ffffff"/>
    <circle cx="150" cy="107" r="2.4" fill="#ffffff"/>
    <!-- nose -->
    <ellipse cx="128" cy="140" rx="9" ry="7" fill="#0F3D0F"/>
    <!-- mouth -->
    <path d="M110 162 q18 14 36 0" fill="none" stroke="#0F3D0F" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(128,214)">
    <rect x="-56" y="-15" width="112" height="30" rx="15" fill="#0F3D0F"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#00C805">UNSTBL</text>
  </g>
</svg>
