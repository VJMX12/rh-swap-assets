<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UNSTBL Unstable Doge Coin">
  <defs>
    <linearGradient id="u-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00C805"/><stop offset="1" stop-color="#00A804"/></linearGradient>
  </defs>
  <circle cx="128" cy="128" r="120" fill="url(#u-bg)"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4"/>
  <!-- wobbly baseline to signal 'unstable' -->
  <path d="M40 150 q22 -26 44 0 t44 0 t44 0 t44 0" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="6" stroke-linecap="round"/>
  <!-- crooked dollar, tilted to look unstable -->
  <g transform="rotate(-12 128 118)">
    <text x="128" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="700" fill="#ffffff" fill-opacity="0.95">$</text>
  </g>
  <!-- doge-ish ears -->
  <path d="M92 44 l14 30 -30 -8 z" fill="#ffffff" fill-opacity="0.9"/>
  <path d="M164 44 l-14 30 30 -8 z" fill="#ffffff" fill-opacity="0.9"/>
  <g transform="translate(128,214)">
    <rect x="-52" y="-15" width="104" height="30" rx="15" fill="#0F172A" fill-opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#00C805">UNSTBL</text>
  </g>
</svg>
